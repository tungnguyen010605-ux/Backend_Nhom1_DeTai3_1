<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Try-On Demo</title>
  <link rel="stylesheet" href="/ui/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Virtual Try-On (CPU Friendly)</h1>
    <p class="hint">Enter body measurements and upload a clothing image.</p>

    <form id="tryon-form">
      <section class="card">
        <h2>User Profile</h2>
        <div class="mode-row">
          <label><input type="radio" name="user_mode" value="existing" checked /> Use existing user</label>
          <label><input type="radio" name="user_mode" value="new" /> Create new user</label>
          <button type="button" id="refresh-users">Refresh users</button>
        </div>
        <div class="grid" id="existing-user-group">
          <label class="full">Existing user
            <select name="existing_user_id" id="existing-user-select"></select>
          </label>
        </div>
        <div class="grid">
          <label>Name <input name="name" type="text" maxlength="100" /></label>
          <label>Height (cm) <input name="height_cm" type="number" step="0.1" min="50" max="260" /></label>
          <label>Chest (cm) <input name="chest_cm" type="number" step="0.1" min="30" max="200" /></label>
          <label>Waist (cm) <input name="waist_cm" type="number" step="0.1" min="30" max="200" /></label>
          <label>Hip (cm) <input name="hip_cm" type="number" step="0.1" min="30" max="220" /></label>
          <label>Inseam (cm) <input name="inseam_cm" type="number" step="0.1" min="20" max="150" /></label>
        </div>
      </section>

      <section class="card">
        <h2>Clothing Input</h2>
        <div class="mode-row">
          <label><input type="radio" name="clothing_mode" value="existing" checked /> Use existing clothing item</label>
          <label><input type="radio" name="clothing_mode" value="new" /> Create new clothing item</label>
          <button type="button" id="refresh-clothing">Refresh clothing</button>
        </div>
        <div class="grid" id="existing-clothing-group">
          <label class="full">Existing clothing item (filtered by selected user)
            <select name="existing_clothing_id" id="existing-clothing-select"></select>
          </label>
        </div>
        <div class="grid">
          <label>Category <input name="category" type="text" value="shirt" minlength="2" maxlength="50" /></label>
          <label>Size <input name="size_label" type="text" value="M" maxlength="20" /></label>
          <label>Color <input name="color" type="text" value="blue" maxlength="30" /></label>
          <label class="full">Clothing image (PNG/JPG)
            <input name="file" type="file" accept="image/png,image/jpeg" />
          </label>
        </div>
      </section>

      <section class="card">
        <h2>Preprocess Settings</h2>
        <div class="grid">
          <label>Width <input required name="width" type="number" value="512" min="64" max="1024" /></label>
          <label>Height <input required name="height" type="number" value="512" min="64" max="1024" /></label>
          <label><input name="normalize" type="checkbox" checked /> Normalize</label>
          <label><input name="augment" type="checkbox" /> Augment (optional)</label>
        </div>
      </section>

      <button id="submit-btn" type="submit">Run Try-On Flow</button>
    </form>

    <section class="card">
      <h2>Status</h2>
      <pre id="status-log">Ready.</pre>
    </section>

    <section class="card">
      <h2>Result</h2>
      <p id="result-link">No result yet.</p>
      <img id="result-image" alt="Generated texture" />
    </section>
  </main>

  <script src="/ui/static/app.js"></script>
</body>
</html>
