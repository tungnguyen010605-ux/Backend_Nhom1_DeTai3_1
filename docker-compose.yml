version: "3.8"

services:
  web:
    build: .
    container_name: vr-dress
    ports:
      - "8000:8000"
    volumes:
      # Map thư mục data để lưu lại database SQLite không bị mất khi container restart/xóa
      - ./Bend/data:/app/Bend/data
      # Map thư mục textures để giữ lại các file ảnh render sau mỗi quá trình
      - ./Bend/static/textures:/app/Bend/static/textures
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
